<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Games</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=M+PLUS+Rounded+1c:wght@700;900&display=swap');
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    font-family: 'M PLUS Rounded 1c', sans-serif;
    background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    padding: 40px 20px;
  }
  h1 {
    color: #fff;
    font-size: 48px;
    font-weight: 900;
    margin-bottom: 40px;
    text-shadow: 3px 3px 0 rgba(0,0,0,0.2);
  }
  .games {
    display: flex;
    flex-wrap: wrap;
    gap: 24px;
    justify-content: center;
    max-width: 800px;
  }
  .game-card {
    background: #fff;
    border-radius: 20px;
    padding: 30px;
    width: 240px;
    text-align: center;
    text-decoration: none;
    color: #333;
    box-shadow: 0 8px 24px rgba(0,0,0,0.15);
    transition: transform 0.2s, box-shadow 0.2s;
  }
  .game-card:hover {
    transform: translateY(-6px);
    box-shadow: 0 12px 32px rgba(0,0,0,0.25);
  }
  .game-card .emoji { font-size: 64px; margin-bottom: 12px; }
  .game-card .name { font-size: 22px; font-weight: 900; }
  .game-card .desc { font-size: 14px; color: #888; margin-top: 8px; font-weight: 700; }
</style>
</head>
<body>
  <h1>Games</h1>
  <div class="games">
    <a href="race-game/" class="game-card">
      <div class="emoji">🏎️</div>
      <div class="name">わくわくレース</div>
      <div class="desc">コインをあつめて走りぬけ!</div>
    </a>
  </div>
</body>
</html>
